name: SteamDeck Beta Build/Release

# 스팀덱 베타 전용 릴리즈 워크플로우.
# steamdeck-beta 브랜치에서 버전 태그(v*)를 푸시하면 Windows 설치파일을 빌드해서
# 이 포크의 GitHub Releases에 prerelease로 올린다 (electron-builder publish).
# 참고: 포크에서는 Actions 탭에서 워크플로우 실행을 한 번 허용해줘야 동작한다.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # package-lock.json이 package.json과 어긋난 상태라 npm ci 대신 install 사용
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check and bundle
        run: npm run build:check

      # electron-builder는 draft가 아닌 릴리즈를 만들 때 태그가 이미 존재해야
      # 한다 (422 "Published releases must have a valid tag"). workflow_dispatch로
      # 실행된 경우 태그가 없을 수 있으므로 여기서 만들어 푸시한다.
      # GITHUB_TOKEN으로 푸시한 태그는 다른 워크플로우를 재귀 트리거하지 않는다.
      - name: Ensure release tag exists
        shell: bash
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          echo "Release tag: $TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on origin"
          else
            git tag -f "$TAG"
            git push origin "$TAG"
          fi

      # electron-builder가 자산 병렬 업로드 중 릴리즈를 중복 생성하는 경쟁
      # 상태가 있어, 릴리즈를 미리 만들어 두면 기존 릴리즈에 자산만 올린다.
      - name: Pre-create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --prerelease --title "$TAG" --notes "Steam Deck beta build"
          fi

      - name: Package and publish Windows installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
