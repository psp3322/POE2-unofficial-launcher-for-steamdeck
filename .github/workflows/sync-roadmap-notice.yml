name: Sync Roadmap Notice

on:
  push:
    branches:
      - master
    paths:
      - "docs/Roadmap.md"
      - "docs/roadmap/developer-roadmap-notice.template.md"
      - "scripts/build-roadmap-issue-body.cjs"
      - "scripts/build-roadmap-notice.cjs"
      - ".github/workflows/sync-roadmap-notice.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout gh-pages
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build roadmap notice
        run: node scripts/build-roadmap-notice.cjs --output gh-pages/notice/roadmap.md

      - name: Commit and push roadmap notice
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notice/roadmap.md
          git commit -m "docs: update roadmap notice [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
