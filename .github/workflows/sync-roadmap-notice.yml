name: Sync Roadmap Notice

on:
  push:
    branches:
      - master
    paths:
      - "docs/Roadmap.md"
      - "docs/roadmap/developer-roadmap-notice.template.md"
      - "scripts/build-roadmap-issue-body.cjs"
      - "scripts/build-roadmap-notice.cjs"
      - ".github/workflows/sync-roadmap-notice.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout gh-pages
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build roadmap notice
        run: node scripts/build-roadmap-notice.cjs --output 'gh-pages/notice/[notice]roadmap.md'

      - name: Commit and push roadmap notice
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'notice/[notice]roadmap.md'
          git commit -m "docs: update roadmap notice" || echo "No changes to commit"
          git push origin gh-pages

      - name: Update notice list
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run automate-notice-list.yml --ref master
