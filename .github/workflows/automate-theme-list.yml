name: Update Theme List Hashes

on:
  push:
    branches:
      - gh-pages
    paths:
      - "assets/themes/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Get generation script from master
        run: |
          mkdir -p scripts
          curl -s https://raw.githubusercontent.com/NERDHEAD-lab/POE2-unofficial-launcher/master/scripts/generate-theme-hashes.js -o scripts/generate-theme-hashes.js

      - name: Generate hashes
        run: node scripts/generate-theme-hashes.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add themes.json
          git commit -m "chore: update theme asset hashes [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
