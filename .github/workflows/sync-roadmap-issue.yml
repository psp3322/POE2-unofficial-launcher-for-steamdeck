name: Sync Roadmap Issue

on:
  push:
    branches:
      - master
    paths:
      - "docs/Roadmap.md"
      - "docs/roadmap/**"
      - "scripts/build-roadmap-issue-body.cjs"
      - ".github/workflows/sync-roadmap-issue.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build issue body
        run: node scripts/build-roadmap-issue-body.cjs --output roadmap-issue-body.md

      - name: Update GitHub Issue #7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit 7 --repo "$GITHUB_REPOSITORY" --body-file roadmap-issue-body.md
